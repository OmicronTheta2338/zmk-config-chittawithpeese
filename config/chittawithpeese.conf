# 1. Enable ZMK Studio (The visual live-editor)
CONFIG_ZMK_STUDIO=y

# 2. Enable Rotary Encoder Support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 3. Boost Bluetooth Signal (Recommended for nice!nano)
# This helps prevent lag if your computer is under a desk
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 4. Power Management (Saves battery)
# Goes to sleep after 15 minutes of inactivity
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000